# Yazi theme - fixed Tokyo Night palette

[manager]
cwd = { fg = "#7dcfff" }
hovered = { fg = "#1a1b26", bg = "#7aa2f7" }
preview_hovered = { underline = true }
find_keyword = { fg = "#e0af68", italic = true }
find_position = { fg = "#bb9af7", bg = "reset", italic = true }
marker_selected = { fg = "#9ece6a", bg = "#9ece6a" }
marker_copied = { fg = "#e0af68", bg = "#e0af68" }
marker_cut = { fg = "#f7768e", bg = "#f7768e" }
tab_active = { fg = "#1a1b26", bg = "#7aa2f7" }
tab_inactive = { fg = "#a9b1d6", bg = "#414868" }
border_style = { fg = "#414868" }

[status]
separator_open = ""
separator_close = ""
separator_style = { fg = "#414868", bg = "#414868" }
mode_normal = { fg = "#1a1b26", bg = "#7aa2f7", bold = true }
mode_select = { fg = "#1a1b26", bg = "#9ece6a", bold = true }
mode_unset = { fg = "#1a1b26", bg = "#f7768e", bold = true }
progress_label = { fg = "#a9b1d6", bold = true }
progress_normal = { fg = "#7aa2f7", bg = "#414868" }
progress_error = { fg = "#f7768e", bg = "#414868" }
permissions_t = { fg = "#7aa2f7" }
permissions_r = { fg = "#e0af68" }
permissions_w = { fg = "#f7768e" }
permissions_x = { fg = "#9ece6a" }
permissions_s = { fg = "#414868" }

[select]
border = { fg = "#7aa2f7" }
active = { fg = "#bb9af7" }
inactive = { fg = "#a9b1d6" }

[input]
border = { fg = "#7aa2f7" }
title = { fg = "#7aa2f7" }
value = { fg = "#a9b1d6" }
selected = { reversed = true }

[completion]
border = { fg = "#7aa2f7" }
active = { fg = "#bb9af7" }
inactive = { fg = "#a9b1d6" }

[tasks]
border = { fg = "#7aa2f7" }
title = { fg = "#7aa2f7" }
hovered = { fg = "#1a1b26", bg = "#7aa2f7" }

[help]
on = { fg = "#e0af68" }
exec = { fg = "#7dcfff" }
desc = { fg = "#a9b1d6" }
hovered = { bg = "#414868", bold = true }
footer = { fg = "#1a1b26", bg = "#7aa2f7" }
