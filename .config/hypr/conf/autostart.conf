# Indicators / applets
exec-once = nm-applet --indicator &
exec-once = blueman-applet &

# Bar and notifications
exec-once = waybar
exec-once = swaync &

# Clipboard history
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = cliphist list | head -n -100 | cliphist delete

# Cursor theme
exec-once = hyprctl setcursor Bibata-Modern-Ice 24

# Auto-mount removable drives
exec-once = udiskie &

# Set night/day mode based on current hour
exec-once = sleep 5 && bash -c 'HOUR=$(date +%H); if [ $HOUR -ge 20 ] || [ $HOUR -lt 07 ]; then ~/.local/bin/night-mode.sh --force-night; else ~/.local/bin/night-mode.sh --force-day; fi'

# Auth agent and keyring
exec-once = systemctl --user start hyprpolkitagent
exec-once = gnome-keyring-daemon --start --components=secrets

# Wallpaper daemon + random wallpaper on start
exec-once = awww-daemon
exec-once = sleep 1 && ~/.local/bin/wallpaper_manager.sh random

# DBus env (required for portals, e.g. screen share / VS Code)
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Generate color scheme from current wallpaper
exec-once = sleep 2 && wallust run "$HOME/.config/rofi/.current_wallpaper"

# Fix backlight permissions on boot
exec-once = ~/.local/bin/fix_backlight.sh
