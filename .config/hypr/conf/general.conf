# Dynamic colors generated by Wallust (pywal-like, from current wallpaper)
source = ~/.config/hypr/colors.conf

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2

    # $color4 / $color5 come from Wallust
    col.active_border = $color4 $color5 45deg
    col.inactive_border = $background

    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}
