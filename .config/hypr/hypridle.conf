general {
    lock_cmd = pidof hyprlock || hyprlock -c $HOME/.config/hypr/hyprlock/hyprlock.conf
    before_sleep_cmd = pidof hyprlock || hyprlock -c $HOME/.config/hypr/hyprlock/hyprlock.conf
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Lock screen and turn off display after 5 min idle
listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after 10 min idle
listener {
    timeout = 900
    on-timeout = systemctl suspend
}

# Full shutdown after 2h idle (7200s)
listener {
    timeout = 7200
    on-timeout = systemctl poweroff
}
